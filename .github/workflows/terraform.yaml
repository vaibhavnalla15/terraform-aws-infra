name: Terraform CI

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/terraform.yaml"

  workflow_dispatch: {}

jobs:
  terraform:
    runs-on: ubuntu-latest

    steps:
      # Checkout Code
      - name: Checkout Code
        uses: actions/checkout@v4

      # Install Terraform
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      # Verify installation
      - name: Terraform Version
        run: terraform version